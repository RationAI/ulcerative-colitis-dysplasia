[project]
name = "project-name"
version = "0.1.0"
authors = []
requires-python = ">=3.12,<3.14"
readme = "README.md"
license = { file = "LICENSE" }
dependencies = [
    "torch>=2.9.0",
    "lightning>=2.4.0",
    "torchmetrics>=1.4.1",
    "mlflow>=3.10.1",
    "hydra-core",       
    "rationai-sdk>=0.1.0",
    "rationai-empaia",
    "rationai-mlkit",
]

[project.optional-dependencies]
job = ["rationai-kube-jobs"]

[tool.uv.sources]
rationai-sdk = { git = "ssh://git@gitlab.ics.muni.cz/rationai/infrastructure/rationai-sdk-python.git" }
rationai-kube-jobs = { git = "ssh://git@gitlab.ics.muni.cz/rationai/infrastructure/kube-jobs" }
rationai-empaia = { git = "ssh://git@gitlab.ics.muni.cz/rationai/digital-pathology/libraries/empaia.git", rev = "feature/workbench-api-clients" }
rationai-mlkit = { git = "https://github.com/RationAI/mlkit.git" }

[dependency-groups]
dev = ["mypy", "ruff"]
